<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{CATEGORY_NAME}} Recipes - DailyRecipe4u</title>
     <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    {{HEADER}}
    {{NAVBAR}}

    <main class="container">
        <header class="category-header">
            <h1>{{CATEGORY_NAME}} <span class="highlight">Recipes</span></h1>
            <p>Exploring the best dishes in {{CATEGORY_NAME}}</p>
        </header>

        <div class="recipe-grid">
            {{RECIPE_CARDS}}
        </div>
    </main>

    {{FOOTER}}

    <style>
        .category-header {
            text-align: center;
            padding: 50px 0;
        }
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        .recipe-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .recipe-card:hover { transform: translateY(-5px); }
        .card-img { position: relative; height: 200px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .category-tag {
            position: absolute; top: 10px; left: 10px;
            background: #e67e22; color: white;
            padding: 5px 12px; border-radius: 5px; font-size: 0.8rem;
        }
        .card-body { padding: 20px; text-align: center; }
        .view-btn {
            display: inline-block; margin-top: 15px;
            color: #e67e22; text-decoration: none; font-weight: 600;
        }
    </style>
</body>
</html>
