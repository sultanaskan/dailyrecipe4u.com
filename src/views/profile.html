<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | DailyRecipe4U</title>
    <style>
        :root {
            --primary: #e67e22;
            --dark: #2c3e50;
            --bg: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --radius: 20px;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Profile Card */
        .profile-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* Header Decor */
        .profile-header {
            background: linear-gradient(135deg, var(--dark) 0%, #34495e 100%);
            height: 120px;
            position: relative;
        }

        /* Avatar Section */
        .profile-body {
            padding: 0 40px 40px;
            text-align: center;
            position: relative;
        }

        .avatar-wrapper {
            width: 120px;
            height: 120px;
            background: var(--primary);
            border: 5px solid var(--white);
            border-radius: 50%;
            margin: -60px auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-name {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .profile-role {
            display: inline-block;
            background: #fdf2e9;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 35px;
            text-align: left;
        }

        .info-item {
            background: #f8fafc;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #edf2f7;
        }

        .info-label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
        }

        /* Actions */
        .profile-actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-edit {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.2);
        }

        .btn-logout {
            background: #fff5f5;
            color: #ff4757;
            border: 1px solid #ffebeb;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .profile-body {
                padding: 0 20px 30px;
            }
        }
    </style>
</head>
<body>

    {{HEADER}}


    {{NAVBAR}}

    <main class="profile-container">
        <div class="profile-card">
            <div class="profile-header"></div>
            
            <div class="profile-body">
                <div class="avatar-wrapper">
                    {{USER_INITIAL}}
                </div>
                
                <h1 class="profile-name">{{FULL_NAME}}</h1>
                <span class="profile-role">{{ROLE}}</span>

                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Username</span>
                        <div class="info-value">@{{USERNAME}}</div>
                    </div>
                    
                    <div class="info-item">
                        <span class="info-label">Email Address</span>
                        <div class="info-value">{{EMAIL}}</div>
                    </div>
                    
                    <div class="info-item">
                        <span class="info-label">Member Since</span>
                        <div class="info-value">{{JOIN_DATE}}</div>
                    </div>
                    
                    <div class="info-item">
                        <span class="info-label">Recipes Shared</span>
                        <div class="info-value">{{RECIPE_COUNT}}</div>
                    </div>
                </div>

                <div class="profile-actions">
                    <a href="/profile/edit" class="btn btn-edit">Edit Profile</a>
                    <a href="/logout" class="btn btn-logout">Sign Out</a>
                </div>
            </div>
        </div>
    </main>

    {{FOOTER}}

</body>
</html>
