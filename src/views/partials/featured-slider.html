<div class="swiper featured-swiper">
    <div class="swiper-wrapper" id="sliderTrack">
        {{SLIDER_ITEMS}}
    </div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-next" id="nextBtn">❯</div>
    <div class="swiper-button-prev" id="prevBtn">❮</div>
</div>

<style>
/* --- CRITICAL LAYOUT FIXED --- */
.swiper-wrapper {
    display: flex;                 /* Lines items up horizontally */
    overflow-x: auto;             /* Allows horizontal overflow */
    scroll-snap-type: x mandatory; /* Makes slides "lock" into place */
    scroll-behavior: smooth;      /* Makes the JS movement smooth */
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;        /* Hides scrollbar (Firefox) */
    gap: 0;
}

.swiper-wrapper::-webkit-scrollbar {
    display: none;                /* Hides scrollbar (Chrome/Safari) */
}

/* Ensure each item generated by {{SLIDER_ITEMS}} behaves correctly */
.swiper-slide {
    flex: 0 0 100%;               /* Each slide is exactly 100% wide */
    width: 100%;
    scroll-snap-align: start;     /* Snap to the start of the card */
    box-sizing: border-box;
}

/* --- DESIGN STYLES --- */
.featured-swiper {
    position: relative;
    width: 100%;
    padding-bottom: 30px;
}

.slide-card {
    position: relative;
    height: 450px;
    margin: 0 10px;               /* Adds a little gap between cards */
    border-radius: 20px;
    overflow: hidden;
    display: block;
}

.slide-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.slide-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 40px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    color: white;
}

.swiper-button-next, .swiper-button-prev {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: #e67e22;
    background: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    font-size: 1.2rem;
    user-select: none;
}

.swiper-button-next { right: 10px; }
.swiper-button-prev { left: 10px; }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const track = document.getElementById('sliderTrack');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    
    if (!track) return;

    // Helper function to get current slide width
    const getSlideWidth = () => track.offsetWidth;

    // 1. Smooth Manual Navigation
    nextBtn.addEventListener('click', () => {
        const maxScroll = track.scrollWidth - track.offsetWidth;
        // If at the end, jump to start
        if (track.scrollLeft >= maxScroll - 5) {
            track.scrollTo({ left: 0, behavior: 'smooth' });
        } else {
            track.scrollBy({ left: getSlideWidth(), behavior: 'smooth' });
        }
    });

    prevBtn.addEventListener('click', () => {
        // If at start, jump to end
        if (track.scrollLeft <= 5) {
            track.scrollTo({ left: track.scrollWidth, behavior: 'smooth' });
        } else {
            track.scrollBy({ left: -getSlideWidth(), behavior: 'smooth' });
        }
    });

    // 2. Autoplay Logic
    let autoplayInterval = setInterval(() => {
        nextBtn.click(); // Reuse the logic we just wrote
    }, 2000);

    // 3. Pause on Hover
    track.parentElement.addEventListener('mouseenter', () => clearInterval(autoplayInterval));
    track.parentElement.addEventListener('mouseleave', () => {
        clearInterval(autoplayInterval);
        autoplayInterval = setInterval(() => nextBtn.click(), 5000);
    });
});
</script>
